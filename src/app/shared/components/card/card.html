<div class="card-container">
  <img
    (click)="navigate(item.id)"
    [src]="item.img"
    [alt]="item.name"
    class="card-img"
  />
  <div class="about">
    <h3>{{ item.name }}</h3>
    <span class="price">₹{{ item.price }}</span>
    <p>{{ item.description }}</p>
    <button class="cart-btn" (click)="addToCart(item)">🛒 Add to Cart</button>
  </div>
</div>
